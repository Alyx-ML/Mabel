name: Deploy Mabel
run-name: "Deploy Mabel — ${{ github.event.head_commit.message || format('manual run from {0}', github.ref_name) }}"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use this workflow as the Pages source
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
