<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#17131c" />
    <meta name="description" content="Mabel — a voice companion." />
    <title>Mabel</title>
    <link rel="icon" type="image/png" href="./public/assets/mabel-portrait.png?v=20260718-8" />
    <link rel="apple-touch-icon" href="./public/assets/mabel-portrait.png?v=20260718-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./mabel.css?v=20260718-6" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section id="permission-screen" class="permission-screen">
        <div class="permission-card">
          <div class="permission-avatar" aria-label="Mabel">
            <img src="./public/assets/mabel-portrait.png?v=20260718-9" alt="Mabel" />
          </div>
          <p class="brand">Mabel</p>
          <h1>Enable your microphone</h1>
          <p>Mabel needs microphone access to hear you. Your audio is used only for the conversation and is not stored.</p>
          <button id="allow-microphone" class="primary-button" type="button">Allow microphone</button>
          <p id="permission-error" class="error-message" hidden></p>
        </div>
      </section>

      <section id="conversation-screen" class="conversation-screen" hidden>
        <header class="topbar">
          <a class="wordmark" href="./" aria-label="Mabel home">Mabel</a>
          <span id="connection-status" class="status">Ready</span>
        </header>

        <div class="conversation-stage">
          <div id="avatar-frame" class="avatar-frame" aria-label="Mabel">
            <img src="./public/assets/mabel-portrait.png?v=20260718-9" alt="Mabel" />
          </div>
          <p id="caption" class="caption" aria-live="polite">Mabel is joining you…</p>
        </div>

        <div class="voice-controls">
          <button id="talk-button" class="talk-button listening" type="button" aria-label="Mute Mabel's microphone" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14.4a3.1 3.1 0 0 0 3.1-3.1V6.5a3.1 3.1 0 0 0-6.2 0v4.8a3.1 3.1 0 0 0 3.1 3.1Zm5.2-3.1a.9.9 0 0 1 1.8 0 7 7 0 0 1-6.1 6.9V21h3.1a.9.9 0 1 1 0 1.8H8a.9.9 0 1 1 0-1.8h3.1v-2.8A7 7 0 0 1 5 11.3a.9.9 0 0 1 1.8 0 5.2 5.2 0 0 0 10.4 0Z" /></svg>
            <span id="talk-label">Microphone on</span>
          </button>
          <button id="stop-button" class="text-button" type="button" hidden>Stop Mabel</button>
        </div>
      </section>
    </main>
    <script src="./mabel-config.js?v=20260718-6"></script>
    <script type="module" src="./mabel.js?v=20260718-11"></script>
  </body>
</html>
